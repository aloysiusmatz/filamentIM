services:
  mongodb:
    image: mongo:latest
    container_name: filament_db
    restart: always
    volumes:
      - /DATA/AppData/filament_db:/data/db

  backend:
    build: ./backend
    container_name: filament_backend
    restart: always
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: filament_management
      JWT_SECRET: filament_super_secret_123
      PORT: 5000
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: filament_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend