services:
  mongodb:
    image: mongo:latest
    container_name: filament_db
    restart: always
    volumes:
      - /DATA/AppData/filament_db:/data/db

  backend:
    build: ./backend
    container_name: filament_backend
    restart: always
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017/filament_management
      - DB_NAME=filament_management
      - JWT_SECRET=isi_bebas_rahasiakan
      - PORT=5000

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL}
    container_name: filament_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
