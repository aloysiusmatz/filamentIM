services:
  mongodb:
    image: mongo:latest
    container_name: filament_db
    restart: always
    volumes:
      - /DATA/AppData/filament_db:/data/db

  backend:
    build: ./backend
    container_name: filament_backend
    restart: always
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/filament_management

  frontend:
    build: ./frontend
    container_name: filament_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
